name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create environment file
        run: |
          cat <<EOF > .env
          DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/Rag_DB
          REDIS_URL=redis://redis:6379/0
          API_KEY=test-api-key
          OPENAI_API_KEY=test-key
          EOF

      - name: Build containers
        run: docker compose -f compose.yaml build

      - name: Start services
        run: docker compose -f compose.yaml up -d

      - name: Show container status
        run: docker compose -f compose.yaml ps

      - name: Run Ruff
        run: docker compose -f compose.yaml exec -T rag_api ruff check .

      - name: Run MyPy
        run: >
          docker compose exec -T rag_api
          mypy api Database ingest retrieval reranking LLM Response utils

      - name: Run Pytest
        run: docker compose -f compose.yaml exec -T rag_api pytest

      - name: Show logs on failure
        if: failure()
        run: docker compose -f compose.yaml logs

      - name: Stop containers
        if: always()
        run: docker compose -f compose.yaml down -v

