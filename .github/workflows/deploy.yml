name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create application directory
        run: |
          ssh -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p /home/ec2-user/rag-app"

      - name: Copy project to EC2
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".env" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            -e "ssh -i ~/.ssh/ec2_key" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/rag-app/"

      - name: Create production environment file
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s' "$PROD_ENV_FILE" > production.env

          scp -i ~/.ssh/ec2_key \
            production.env \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/rag-app/.env"

          rm production.env

      - name: Start application
        run: |
          ssh -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
              set -e
              cd /home/ec2-user/rag-app

              docker compose down
              docker compose up --build -d
              docker compose ps
          EOF